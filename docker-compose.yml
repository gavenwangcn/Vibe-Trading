services:
  vibe-trading:
    build: .
    ports:
      - "8899:8899"
    env_file:
      - agent/.env
    volumes:
      - vibe-runs:/app/agent/runs
      - vibe-sessions:/app/agent/sessions
      # MCP 等配置持久化；须挂载目录而非单文件，否则容器内 os.replace(.tmp→json) 在 bind 单文件上易 EBUSY
      - ./agent/config:/app/agent/config
    restart: unless-stopped

  frontend:
    image: node:20
    working_dir: /app
    ports:
      - "5899:5899"
    volumes:
      - ./frontend:/app
    environment:
      - VITE_API_URL=http://vibe-trading:8899
    command: sh -c "npm install && npm run dev -- --host --port 5899"
    profiles:
      - frontend
    depends_on:
      vibe-trading:
        condition: service_started

volumes:
  vibe-runs:
  vibe-sessions:
