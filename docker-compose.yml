services:
  vibe-trading:
    build: .
    ports:
      - "8899:8899"
    env_file:
      - agent/.env
    volumes:
      - vibe-runs:/app/agent/runs
      - vibe-sessions:/app/agent/sessions
      # MCP 服务器列表等持久化在 agent/config/mcp_user_config.json；不挂载则重建容器后会丢失
      - ./agent/config/mcp_user_config.json:/app/agent/config/mcp_user_config.json
    restart: unless-stopped

  frontend:
    image: node:20
    working_dir: /app
    ports:
      - "5899:5899"
    volumes:
      - ./frontend:/app
    environment:
      - VITE_API_URL=http://vibe-trading:8899
    command: sh -c "npm install && npm run dev -- --host --port 5899"
    profiles:
      - frontend
    depends_on:
      vibe-trading:
        condition: service_started

volumes:
  vibe-runs:
  vibe-sessions:
